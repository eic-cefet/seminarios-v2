name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ============================================
  # FAST-TRACK GATE
  # Skip the heavy test jobs when the push to main is a VERSION-only
  # commit (the bot's release PR merge). Branch A in the release job
  # then tags it. Other pushes go through the full test suite.
  # ============================================

  gate:
    name: Release Gate
    runs-on: ubuntu-latest
    outputs:
      fast_track: ${{ steps.detect.outputs.fast_track }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect VERSION-only change
        id: detect
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || true)
          OTHER=$(echo "$CHANGED" | grep -vx 'VERSION' | grep -v '^$' | wc -l | tr -d ' ')
          if [ "$OTHER" -eq 0 ] && echo "$CHANGED" | grep -qx 'VERSION'; then
            echo "fast_track=true" >> $GITHUB_OUTPUT
            echo "VERSION-only change — skipping tests, going straight to release."
          else
            echo "fast_track=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # PARALLEL TEST JOBS
  # ============================================

  backend-tests:
    name: Backend Tests
    needs: gate
    if: needs.gate.outputs.fast_track != 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl, gd, exif, iconv
          coverage: pcov

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get cache directories
        id: cache-dirs
        shell: bash
        run: |
          echo "PNPM_STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
          echo "COMPOSER_CACHE=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-dirs.outputs.COMPOSER_CACHE }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-dirs.outputs.PNPM_STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (parallel)
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader &
          pnpm install --frozen-lockfile &
          wait

      - name: Build frontend assets and prepare environment
        run: |
          pnpm run build &
          cp .env.example .env
          wait
          php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --compact --coverage-clover=coverage/backend-clover.xml
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/backend-clover.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    name: Frontend Tests
    needs: gate
    if: needs.gate.outputs.fast_track != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests with coverage
        run: pnpm test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # RELEASE GATE (depends on all test jobs)
  # ============================================

  release:
    name: Release
    needs: [gate, backend-tests, frontend-tests]
    if: |
      always() && (
        needs.gate.outputs.fast_track == 'true' ||
        (needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name  "seminarios-bot[bot]"
          git config user.email "seminarios-bot[bot]@users.noreply.github.com"

      # ---------------------------------------------------------------
      # Branch A — this commit IS a VERSION bump → tag it and exit.
      # ---------------------------------------------------------------
      - name: Detect VERSION file change in HEAD
        id: detect
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx 'VERSION'; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag the VERSION-bump commit
        if: steps.detect.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ ! -f VERSION ]; then
            echo "VERSION file is missing despite being in the diff — aborting."
            exit 1
          fi
          NEW_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$NEW_VERSION" ]; then
            echo "VERSION file is empty — aborting."
            exit 1
          fi
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists — nothing to do."
            exit 0
          fi

          # Find the just-merged release PR for this version and pull its body
          # so the tag annotation links back to the source PRs that triggered
          # the bump (parsed from the "<!-- source-prs: ... -->" marker).
          REL_PR=$(gh pr list --state merged --search "head:release/${NEW_VERSION}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          SRC_REFS=""
          if [ -n "$REL_PR" ]; then
              BODY=$(gh pr view "$REL_PR" --json body --jq .body 2>/dev/null || echo "")
              SRC_REFS=$(echo "$BODY" | grep -oE '<!-- source-prs: [^>]*-->' | sed -E 's/<!-- source-prs: ([^>]*) *-->/\1/' | head -1 | sed 's/ *$//')
          fi

          TAG_MSG="Release ${NEW_VERSION}"
          if [ -n "$REL_PR" ]; then
              TAG_MSG="${TAG_MSG}"$'\n\n'"Release PR: #${REL_PR}"
          fi
          if [ -n "$SRC_REFS" ]; then
              TAG_MSG="${TAG_MSG}"$'\n'"Source PRs: ${SRC_REFS}"
          fi

          git tag -a "$NEW_VERSION" -m "$TAG_MSG"
          git push origin "$NEW_VERSION"

      # ---------------------------------------------------------------
      # Branch B — normal commit → maybe open a release PR.
      # ---------------------------------------------------------------
      - name: Bail if there is already an open release PR
        if: steps.detect.outputs.version_changed != 'true'
        id: open-release-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COUNT=$(gh pr list --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("release/v"))] | length')
          echo "open_count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "An open release/* PR exists — skipping. The follow-up release run will pick this commit up cumulatively after that PR merges."
          fi

      - name: Compute cumulative bump from PRs since last tag
        if: steps.detect.outputs.version_changed != 'true' && steps.open-release-pr.outputs.open_count == '0'
        id: cumulative
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          source .github/workflows/scripts/release-bump.sh

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
              RANGE="$LATEST_TAG..${{ github.sha }}"
          else
              RANGE="${{ github.sha }}"
          fi

          # Collect PR numbers from merge commits in the range. The merge commit
          # subject from squash/merge PRs ends in "(#N)"; we grep that out.
          PR_NUMBERS=$(git log --pretty=%s "$RANGE" | grep -oE '\(#[0-9]+\)$' | tr -d '(#)' | sort -u || true)

          BUMPS=()
          for N in $PR_NUMBERS; do
              BODY=$(gh pr view "$N" --json body --jq .body 2>/dev/null || echo "")
              MATCH=$(echo "$BODY" | grep -oiE 'version_bump=(none|patch|minor|major)' | head -1 | cut -d= -f2 | tr '[:upper:]' '[:lower:]')
              [ -n "$MATCH" ] && BUMPS+=("$MATCH")
          done

          CUM=$(cumulative_bump "${BUMPS[@]:-none}")
          PR_LIST=$(echo "$PR_NUMBERS" | tr '\n' ' ' | sed 's/ *$//')
          echo "Cumulative bump since $LATEST_TAG: $CUM (from PRs: $PR_LIST)"
          echo "bump=$CUM" >> $GITHUB_OUTPUT
          echo "pr_numbers=$PR_LIST" >> $GITHUB_OUTPUT

      - name: Open the release PR
        if: steps.detect.outputs.version_changed != 'true' && steps.open-release-pr.outputs.open_count == '0' && steps.cumulative.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBERS: ${{ steps.cumulative.outputs.pr_numbers }}
        run: |
          source .github/workflows/scripts/release-bump.sh

          CURRENT=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "v0.0.0")
          NEW_VERSION=$(bump_version "$CURRENT" "${{ steps.cumulative.outputs.bump }}")
          BRANCH="release/${NEW_VERSION}"

          # Build a "#1 #2 #3" list and a markdown bullet list of the source PRs.
          SRC_REFS=""
          SRC_BULLETS=""
          for N in $PR_NUMBERS; do
              SRC_REFS="${SRC_REFS}#${N} "
              TITLE=$(gh pr view "$N" --json title --jq .title 2>/dev/null || echo "")
              SRC_BULLETS="${SRC_BULLETS}- #${N} ${TITLE}"$'\n'
          done
          SRC_REFS="${SRC_REFS% }"
          if [ -z "$SRC_REFS" ]; then
              SRC_REFS="(none)"
              SRC_BULLETS="- (no source PRs detected)"
          fi

          # If the branch already exists remotely (e.g. a previous run crashed
          # mid-way), abort — a human should investigate before we overwrite it.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin — aborting to avoid clobber."
            exit 1
          fi

          git checkout -b "$BRANCH"
          echo "$NEW_VERSION" > VERSION
          git add VERSION
          git commit -m "chore(release): ${NEW_VERSION}"
          git push origin "$BRANCH"

          # Title carries the source PR refs so it shows up in the changelog
          # and on the resulting tag annotation. If the list is too long,
          # gracefully truncate to keep the title under GitHub's limits.
          TITLE_REFS="$SRC_REFS"
          TITLE="chore(release): ${NEW_VERSION} (${TITLE_REFS})"
          if [ ${#TITLE} -gt 240 ]; then
              TITLE="chore(release): ${NEW_VERSION} (multiple PRs — see body)"
          fi

          PR_BODY=$(cat <<EOF
          ## What Changed
          Bump VERSION from ${CURRENT} to ${NEW_VERSION}.

          ## Source PRs
          ${SRC_BULLETS}
          <!-- source-prs: ${SRC_REFS} -->

          ## Why
          Auto-generated release PR. Merging this PR will create the \`${NEW_VERSION}\` git tag.

          ## Configuration

          \`\`\`
          automerge=true
          version_bump=none
          \`\`\`

          ## Checklist
          - [x] I have tested my code locally
          - [x] All tests are passing
          - [x] New code has adequate test coverage
          EOF
          )

          PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$PR_BODY")
          echo "Opened release PR: $PR_URL"

          gh pr merge --auto --squash "$PR_URL" || \
            echo "Auto-merge could not be enabled (perhaps disabled on the repo). The PR is open and can be merged manually."
