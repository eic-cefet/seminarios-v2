name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================
  # GATE: Checklist Validation (runs first)
  # ============================================
  checklist:
    name: Checklist Validation
    runs-on: ubuntu-latest
    outputs:
      automerge: ${{ steps.parse.outputs.automerge }}
      version_bump: ${{ steps.parse.outputs.version_bump }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse and validate PR template
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = context.payload.pull_request.body || '';

            // Parse automerge (key=value format)
            const automergeMatch = body.match(/automerge=(true|false)/i);
            const automerge = automergeMatch ? automergeMatch[1].toLowerCase() : 'false';
            core.setOutput('automerge', automerge);

            // Parse version_bump (key=value format)
            const versionMatch = body.match(/version_bump=(patch|minor|major)/i);
            const versionBump = versionMatch ? versionMatch[1].toLowerCase() : '';
            core.setOutput('version_bump', versionBump);

            // Validate version_bump exists
            if (!versionBump) {
              core.setFailed('version_bump is required. Valid values: patch, minor, major');
              return;
            }

            // Validate checklist items are checked
            const requiredChecks = [
              'I have tested my code locally',
              'All tests are passing',
              'New code has adequate test coverage'
            ];

            const unchecked = requiredChecks.filter(check => {
              const pattern = new RegExp(`-\\s*\\[x\\]\\s*${check.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
              return !pattern.test(body);
            });

            if (unchecked.length > 0) {
              core.setFailed(`Unchecked items:\n${unchecked.map(c => '- ' + c).join('\n')}`);
            }

  # ============================================
  # PARALLEL JOBS (depend on checklist)
  # ============================================

  tests:
    name: Tests & Coverage (95%)
    needs: checklist
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Check for backend/test changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
              - 'bootstrap/**'
              - 'config/**'
              - 'database/**'
              - 'resources/**'
              - 'routes/**'
              - 'tests/**'
              - 'composer.json'
              - 'composer.lock'

      - name: Setup PHP
        if: steps.filter.outputs.backend == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl, gd, exif, iconv
          coverage: pcov

      - name: Setup Node.js
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.filter.outputs.backend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        if: steps.filter.outputs.backend == 'true'
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Get composer cache directory
        if: steps.filter.outputs.backend == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache pnpm dependencies
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install composer dependencies
        if: steps.filter.outputs.backend == 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install pnpm dependencies
        if: steps.filter.outputs.backend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        if: steps.filter.outputs.backend == 'true'
        run: pnpm run build

      - name: Copy environment file
        if: steps.filter.outputs.backend == 'true'
        run: cp .env.example .env

      - name: Generate application key
        if: steps.filter.outputs.backend == 'true'
        run: php artisan key:generate

      - name: Run tests with coverage
        if: steps.filter.outputs.backend == 'true'
        run: php artisan test --compact --min=95 --coverage-clover=coverage/backend-clover.xml
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Upload backend coverage to Codecov
        if: steps.filter.outputs.backend == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/backend-clover.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip message
        if: steps.filter.outputs.backend != 'true'
        run: echo "No backend/test changes detected, skipping tests"

  frontend-tests:
    name: Frontend Tests & Coverage (90%)
    needs: checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'resources/js/**'
              - 'vitest.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'

      - name: Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.filter.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        if: steps.filter.outputs.frontend == 'true'
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests with coverage
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm test:coverage

      - name: Upload frontend coverage to Codecov
        if: steps.filter.outputs.frontend == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip message
        if: steps.filter.outputs.frontend != 'true'
        run: echo "No frontend changes detected, skipping frontend tests"

  typecheck:
    name: TypeScript Check
    needs: checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'resources/**'

      - name: Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.filter.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm typecheck

      - name: Skip message
        if: steps.filter.outputs.frontend != 'true'
        run: echo "No frontend changes detected, skipping typecheck"

  claude-review:
    name: Claude Code Review
    needs: checklist
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request thoroughly. The PR branch is already checked out.

            **Code Review** — Focus on:
            - Potential bugs or correctness issues
            - Code quality, Laravel and React best practices
            - Security concerns (OWASP top 10, injection, XSS)
            - Performance (N+1 queries, unnecessary re-renders, missing indexes)
            - Test coverage adequacy

            Use `gh pr comment` for the review summary.
            Use `mcp__github_inline_comment__create_inline_comment` to annotate specific code issues inline.

            **Label Categorization** — After reviewing, categorize this PR by syncing labels.
            Valid category labels (with hex colors for creation):
            - feature (#0e8a16), bugfix (#d73a4a), documentation (#0075ca)
            - tests (#fbca04), frontend (#1d76db), backend (#5319e7)
            - config (#c5def5), refactor (#fef2c0), dependencies (#006b75)

            Steps:
            1. Determine which category labels apply (at least one, multiple encouraged)
            2. Check current labels on the PR with `gh pr view`
            3. Remove any stale category labels with `gh pr edit --remove-label`
            4. Add new category labels with `gh pr edit --add-label`
            5. If a label doesn't exist yet, create it first with `gh label create <name> --color <hex> --force`
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh label create:*),Bash(gh label list:*)"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ============================================
  # FINAL GATE (always runs, checks all jobs)
  # ============================================

  final-status:
    name: Final Status
    needs: [checklist, tests, frontend-tests, typecheck, claude-review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "Checklist: ${{ needs.checklist.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Claude Review: ${{ needs.claude-review.result }}"

          # Fail if any required job failed
          if [[ "${{ needs.checklist.result }}" == "failure" ]]; then
            echo "::error::Checklist validation failed"
            exit 1
          fi
          if [[ "${{ needs.tests.result }}" == "failure" ]]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "::error::Frontend tests failed"
            exit 1
          fi
          if [[ "${{ needs.typecheck.result }}" == "failure" ]]; then
            echo "::error::TypeScript check failed"
            exit 1
          fi
          if [[ "${{ needs.claude-review.result }}" == "failure" ]]; then
            echo "::error::Claude review failed"
            exit 1
          fi

          echo "All checks passed or were appropriately skipped"

      - name: Checkout code
        if: needs.checklist.outputs.automerge == 'true'
        uses: actions/checkout@v4

      - name: Generate GitHub App Token for automerge
        if: needs.checklist.outputs.automerge == 'true'
        id: app-token-automerge
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Add automerge label and enable automerge
        if: needs.checklist.outputs.automerge == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token-automerge.outputs.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "automerge"
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
