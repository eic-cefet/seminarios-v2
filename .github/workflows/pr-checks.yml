name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================
  # FAST-TRACK GATE
  # Detects bot release PRs (head ref `release/v*` with only VERSION
  # changed) so the heavy jobs can be skipped entirely. Runs in
  # parallel with the checklist gate.
  # ============================================
  gate:
    name: PR Fast-Track Gate
    runs-on: ubuntu-latest
    outputs:
      fast_track: ${{ steps.detect.outputs.fast_track }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect bot release PR
        id: detect
        run: |
          HEAD_REF="${{ github.head_ref }}"
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          OTHER=$(echo "$CHANGED" | grep -vx 'VERSION' | grep -v '^$' | wc -l | tr -d ' ')
          if [[ "$HEAD_REF" == release/v* ]] && [ "$OTHER" -eq 0 ] && echo "$CHANGED" | grep -qx 'VERSION'; then
            echo "fast_track=true" >> $GITHUB_OUTPUT
            echo "Release PR with VERSION-only change — heavy jobs will be skipped."
          else
            echo "fast_track=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # GATE: Checklist Validation (runs first)
  # ============================================
  checklist:
    name: Checklist Validation
    runs-on: ubuntu-latest
    outputs:
      automerge: ${{ steps.parse.outputs.automerge }}
      version_bump: ${{ steps.parse.outputs.version_bump }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse and validate PR template
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = context.payload.pull_request.body || '';

            // Parse automerge (key=value format)
            const automergeMatch = body.match(/automerge=(true|false)/i);
            const automerge = automergeMatch ? automergeMatch[1].toLowerCase() : 'false';
            core.setOutput('automerge', automerge);

            // Parse version_bump (key=value format)
            const versionMatch = body.match(/version_bump=(none|patch|minor|major)/i);
            const versionBump = versionMatch ? versionMatch[1].toLowerCase() : '';
            core.setOutput('version_bump', versionBump);

            // Validate version_bump exists
            if (!versionBump) {
              core.setFailed('version_bump is required. Valid values: none, patch, minor, major');
              return;
            }

            // Validate checklist items are checked
            const requiredChecks = [
              'I have tested my code locally',
              'All tests are passing',
              'New code has adequate test coverage'
            ];

            const unchecked = requiredChecks.filter(check => {
              const pattern = new RegExp(`-\\s*\\[x\\]\\s*${check.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
              return !pattern.test(body);
            });

            if (unchecked.length > 0) {
              core.setFailed(`Unchecked items:\n${unchecked.map(c => '- ' + c).join('\n')}`);
            }

  # ============================================
  # PARALLEL JOBS (depend on checklist)
  # ============================================

  tests:
    name: Tests & Coverage (95%)
    needs: [checklist, gate]
    if: needs.gate.outputs.fast_track != 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Check for backend/test changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
              - 'bootstrap/**'
              - 'config/**'
              - 'database/**'
              - 'resources/**'
              - 'routes/**'
              - 'tests/**'
              - 'composer.json'
              - 'composer.lock'

      - name: Setup PHP
        if: steps.filter.outputs.backend == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl, gd, exif, iconv, sockets
          coverage: pcov

      - name: Setup Node.js
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.filter.outputs.backend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        if: steps.filter.outputs.backend == 'true'
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Get composer cache directory
        if: steps.filter.outputs.backend == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache pnpm dependencies
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (parallel)
        if: steps.filter.outputs.backend == 'true'
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader &
          pnpm install --frozen-lockfile &
          wait

      - name: Build frontend assets and prepare environment
        if: steps.filter.outputs.backend == 'true'
        run: |
          pnpm run build &
          cp .env.example .env
          # The browser-test server boots from .env. Force test-safe drivers so
          # the seminar/presence register POSTs don't hit the database cache
          # lock or a real SMTP host (SESSION stays database so browser auth
          # persists across requests).
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/; s/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/; s/^MAIL_MAILER=.*/MAIL_MAILER=log/' .env
          wait
          php artisan key:generate

      - name: Install Playwright browsers for Pest browser tests
        if: steps.filter.outputs.backend == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests with coverage
        if: steps.filter.outputs.backend == 'true'
        run: php artisan test --compact --min=95 --coverage-clover=coverage/backend-clover.xml
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Upload backend coverage to Codecov
        if: steps.filter.outputs.backend == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/backend-clover.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip message
        if: steps.filter.outputs.backend != 'true'
        run: echo "No backend/test changes detected, skipping tests"

  frontend:
    name: Frontend Tests, Coverage (90%) & Typecheck
    needs: [checklist, gate]
    if: needs.gate.outputs.fast_track != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'resources/**'
              - 'vitest.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'

      - name: Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.filter.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        if: steps.filter.outputs.frontend == 'true'
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run a11y lint (System SPA + Shared)
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm run lint:a11y

      - name: Run typecheck
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm typecheck

      - name: Run frontend tests with coverage
        if: steps.filter.outputs.frontend == 'true'
        run: pnpm test:coverage -- --maxWorkers=4

      - name: Upload frontend coverage to Codecov
        if: steps.filter.outputs.frontend == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip message
        if: steps.filter.outputs.frontend != 'true'
        run: echo "No frontend changes detected, skipping frontend checks"

  ai-review:
    name: AI Code Review
    needs: [checklist, gate]
    if: github.event.pull_request.head.repo.full_name == github.repository && needs.gate.outputs.fast_track != 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run AI review
        uses: ./.github/actions/ai-review
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          openrouter-model: ${{ vars.OPENROUTER_MODEL }}
          github-token: ${{ steps.app-token.outputs.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.base_ref }}
          reasoning-effort: ${{ vars.AI_REVIEW_EFFORT }}

  # ============================================
  # FINAL GATE (always runs, checks all jobs)
  # ============================================

  final-status:
    name: Final Status
    needs: [gate, checklist, tests, frontend, ai-review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "Checklist: ${{ needs.checklist.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "AI Review (advisory): ${{ needs.ai-review.result }}"

          # Fail if any required job failed
          if [[ "${{ needs.checklist.result }}" == "failure" ]]; then
            echo "::error::Checklist validation failed"
            exit 1
          fi
          if [[ "${{ needs.tests.result }}" == "failure" ]]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "::error::Frontend checks failed"
            exit 1
          fi

          echo "All checks passed or were appropriately skipped"

      - name: Checkout code
        if: needs.checklist.outputs.automerge == 'true'
        uses: actions/checkout@v4

      - name: Generate GitHub App Token for automerge
        if: needs.checklist.outputs.automerge == 'true'
        id: app-token-automerge
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Add automerge label and enable automerge
        if: needs.checklist.outputs.automerge == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token-automerge.outputs.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "automerge"
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
